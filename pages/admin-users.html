<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5" />
    <title>Admin Dashboard - Food Connect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: #f4f7fa;
            color: #1e293b;
            line-height: 1.6;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 24px 28px 32px;
        }

        .app-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 16px;
            border-bottom: 2px solid #e9edf2;
            margin-bottom: 28px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            background: #06392f;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .logo-text {
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .logo-text span {
            color: #06392f;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge-role {
            background: #eef2f6;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            background: #06392f;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .btn:hover {
            background: #16632a;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #06392f;
            color: #06392f;
        }
        .btn-outline:hover {
            background: #06392f;
            color: white;
        }
        .btn-sm {
            padding: 4px 14px;
            font-size: 0.8rem;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8fafc;
            border-radius: 18px;
            padding: 18px 20px;
            border-left: 5px solid #06392f;
        }
        .stat-card .stat-number {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.2;
        }
        .stat-card .stat-label {
            font-size: 0.85rem;
            color: #475569;
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 24px 0 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-wrap {
            overflow-x: auto;
            background: #fafcff;
            border-radius: 18px;
            border: 1px solid #e9edf2;
            padding: 4px 0;
            margin: 12px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            text-align: left;
            padding: 14px 16px;
            background: #f1f5f9;
            font-weight: 600;
            color: #1e293b;
        }
        td {
            padding: 14px 16px;
            border-top: 1px solid #ecf1f7;
            vertical-align: middle;
        }

        .badge-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            background: #e9edf2;
            color: #334155;
        }
        .badge-status.approved {
            background: #dcfce7;
            color: #166534;
        }
        .badge-status.live {
            background: #dbeafe;
            color: #1e40af;
        }
        .badge-status.delivered {
            background: #e0e7ff;
            color: #3730a3;
        }
        .badge-status.pending {
            background: #fef9c3;
            color: #854d0e;
        }

        .form-card {
            background: #fafcff;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid #e9edf2;
            margin: 16px 0;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #dce2ea;
            border-radius: 12px;
            font-size: 0.95rem;
            background: white;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .dashboard-container {
                padding: 16px;
            }
        }

        .flex {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }
        .flex-between {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .text-muted {
            color: #64748b;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #94a3b8;
            background: none;
            border: none;
        }
        .modal-close:hover {
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-seedling"></i></div>
                <div class="logo-text"><span>Food Connect</span></div>
            </div>
            <div class="header-actions">
                <span class="badge-role"><i class="fas fa-user-circle"></i> Admin</span>
                <a href="index.html" class="btn btn-outline btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card"><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Total Orders</div></div>
            <div class="stat-card"><div class="stat-number" id="liveListings">0</div><div class="stat-label"> Listings</div></div>
            <div class="stat-card"><div class="stat-number" id="pendingReviews">0</div><div class="stat-label">Pending Review</div></div>
            <div class="stat-card"><div class="stat-number" id="totalRevenue">KSh 0</div><div class="stat-label">Total Revenue</div></div>
        </div>

        <!-- Orders -->
        <div class="flex-between">
            <h3 class="section-title"><i class="fas fa-list-ul"></i> All Orders</h3>
            <button class="btn btn-sm" onclick="triggerPayout()"><i class="fas fa-coins"></i> Trigger Payouts</button>
        </div>
        <div id="ordersContainer">
            <p class="text-muted">No orders found.</p>
        </div>

        <!-- Locations -->
        <h3 class="section-title"><i class="fas fa-warehouse"></i> Manage Locations</h3>
        <div class="form-card">
            <div class="form-row">
                <div class="form-group">
                    <label>Location</label>
                    <input type="text" id="newCheckpointInput" placeholder="e.g. Kisumu Hub" />
                </div>
                <div class="form-group">
                    <label>Region</label>
                    <input type="text" id="newRegionInput" placeholder="e.g. Kisumu" />
                </div>
            </div>
            <button class="btn" onclick="addCheckpoint()"><i class="fas fa-plus"></i> Add Location</button>
        </div>
        <div class="flex" id="checkpointsList"></div>

        <!-- Logistics Partners -->
        <h3 class="section-title"><i class="fas fa-truck"></i> Logistics Partners</h3>
        <div id="logisticsContainer">
            <p class="text-muted">No logistics partners registered.</p>
        </div>

        <!-- Users -->
        <h3 class="section-title"><i class="fas fa-users"></i> User Management</h3>
        <div id="usersContainer">
            <p class="text-muted">No users registered.</p>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // Mock data
        const MOCK = {
            orders: [
                { id: 201, buyer: 'Supermarket Ltd', total: 5400, status: 'booked_awaiting', checkpoint: 'Nakuru Central' },
                { id: 202, buyer: 'Green Grocers', total: 7800, status: 'approved_ready', checkpoint: 'Nakuru Central' },
                { id: 203, buyer: 'City Mart', total: 3200, status: 'delivered', checkpoint: 'Kiambu Town' },
                { id: 204, buyer: 'Fresh Market', total: 9600, status: 'approved_ready', checkpoint: 'Kiambu Town' },
            ],
            listings: [
                { id: 101, status: 'live' },
                { id: 102, status: 'pending_review' },
                { id: 103, status: 'pending_review' },
                { id: 104, status: 'live' },
            ],
            checkpoints: ['Nakuru Central', 'Kiambu Town', 'Lang\'ata Hub', 'Mombasa Road', 'Kisumu Port'],
            transporters: [
                { id: 1, name: 'FastHaul Logistics', trucks: ['Refrigerated', 'Open'] },
                { id: 2, name: 'GreenTransit', trucks: ['Refrigerated'] },
                { id: 3, name: 'CountyLink', trucks: ['Open'] },
            ],
            users: [
                { name: 'Jane Muthoni', role: 'Farmer', region: 'Nakuru', status: 'Active' },
                { name: 'Peter Ochieng', role: 'Farmer', region: 'Kiambu', status: 'Active' },
                { name: 'Supermarket Ltd', role: 'Buyer', region: 'Nairobi', status: 'Active' },
                { name: 'John Inspector', role: 'Inspector', region: 'Nakuru Central', status: 'Active' },
            ]
        };

        function updateDashboard() {
            const totalOrders = MOCK.orders.length;
            const liveListings = MOCK.listings.filter(l => l.status === 'live').length;
            const pendingReviews = MOCK.listings.filter(l => l.status === 'pending_review').length;
            const totalRevenue = MOCK.orders.reduce((sum, o) => sum + o.total, 0);

            document.getElementById('totalOrders').textContent = totalOrders;
            document.getElementById('liveListings').textContent = liveListings;
            document.getElementById('pendingReviews').textContent = pendingReviews;
            document.getElementById('totalRevenue').textContent = `KSh ${totalRevenue.toLocaleString()}`;

            // Orders
            const ordersContainer = document.getElementById('ordersContainer');
            if (MOCK.orders.length === 0) {
                ordersContainer.innerHTML = '<p class="text-muted">No orders found.</p>';
            } else {
                let html = `<div class="table-wrap"><table>
                    <thead><tr><th>Order ID</th><th>Buyer</th><th>Status</th><th>Checkpoint</th><th>Total</th><th>Action</th></tr></thead>
                    <tbody>`;
                MOCK.orders.forEach(o => {
                    html += `<tr>
                        <td>#${o.id}</td>
                        <td>${o.buyer}</td>
                        <td><span class="badge-status ${o.status.replace('_','-')}">${o.status.replace('_',' ')}</span></td>
                        <td>${o.checkpoint}</td>
                        <td>KSh ${o.total}</td>
                        <td><button class="btn btn-sm btn-outline" onclick="viewOrder(${o.id})">View</button></td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
                ordersContainer.innerHTML = html;
            }

            // Checkpoints
            const checkpointsList = document.getElementById('checkpointsList');
            checkpointsList.innerHTML = MOCK.checkpoints.map(c => 
                `<span class="badge-status" style="background:#e9edf2;">${c}</span>`
            ).join(' ');

            // Logistics
            const logisticsContainer = document.getElementById('logisticsContainer');
            if (MOCK.transporters.length === 0) {
                logisticsContainer.innerHTML = '<p class="text-muted">No logistics partners registered.</p>';
            } else {
                let html = `<div class="table-wrap"><table>
                    <thead><tr><th>Name</th><th>Trucks</th><th>Status</th></tr></thead>
                    <tbody>`;
                MOCK.transporters.forEach(t => {
                    html += `<tr>
                        <td>${t.name}</td>
                        <td>${t.trucks.join(', ')}</td>
                        <td><span class="badge-status approved">Active</span></td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
                logisticsContainer.innerHTML = html;
            }

            // Users
            const usersContainer = document.getElementById('usersContainer');
            if (MOCK.users.length === 0) {
                usersContainer.innerHTML = '<p class="text-muted">No users registered.</p>';
            } else {
                let html = `<div class="table-wrap"><table>
                    <thead><tr><th>Name</th><th>Role</th><th>Region</th><th>Status</th></tr></thead>
                    <tbody>`;
                MOCK.users.forEach(u => {
                    html += `<tr>
                        <td>${u.name}</td>
                        <td>${u.role}</td>
                        <td>${u.region}</td>
                        <td><span class="badge-status approved">${u.status}</span></td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
                usersContainer.innerHTML = html;
            }
        }

        function viewOrder(orderId) {
            const order = MOCK.orders.find(o => o.id === orderId);
            if (order) {
                showModal(`Order #${orderId} Details`, `
                    <p><strong>Buyer:</strong> ${order.buyer}</p>
                    <p><strong>Status:</strong> ${order.status.replace('_', ' ')}</p>
                    <p><strong>Checkpoint:</strong> ${order.checkpoint}</p>
                    <p><strong>Total:</strong> KSh ${order.total}</p>
                `);
            }
        }

        function triggerPayout() {
            const delivered = MOCK.orders.filter(o => o.status === 'delivered');
            if (delivered.length === 0) {
                showModal('Payout Status', 'No delivered orders requiring payout.');
                return;
            }
            let totalPayout = delivered.reduce((sum, o) => sum + o.total, 0);
            showModal('Payout Triggered', `
                <p><strong>Payouts triggered for ${delivered.length} delivered orders.</strong></p>
                <p>Total payout amount: KSh ${totalPayout.toLocaleString()}</p>
                <p class="text-muted" style="font-size:0.85rem; margin-top:12px;">Funds sent via M-Pesa B2C API.</p>
            `);
        }

        function addCheckpoint() {
            const name = document.getElementById('newCheckpointInput').value.trim();
            const region = document.getElementById('newRegionInput').value.trim();
            if (name) {
                MOCK.checkpoints.push(name);
                document.getElementById('newCheckpointInput').value = '';
                document.getElementById('newRegionInput').value = '';
                showModal('Checkpoint Added', `${name} has been added to the network.`);
                updateDashboard();
            } else {
                showModal('Error', 'Please enter a checkpoint name.');
            }
        }

        function showModal(title, content) {
            document.getElementById('modalBody').innerHTML = `
                <h3 style="margin-bottom:12px;">${title}</h3>
                <div>${content}</div>
            `;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        updateDashboard();
    </script>
</body>
</html>
